<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Jump</title>
    <link rel="icon" href="./img/Mario_Logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- ================================================== -->
    <!-- AREA PRINCIPAL DO JOGO - Tudo acontece aqui dentro -->
    <!-- ================================================== -->

    



    <div class="jogo">
        <div class="pontuacao">
            <img src="./img/pontos.png" alt="" width="100px" class="placar">
            <h2 class="number">Em Breve</h2>
        </div>

        <!-- PERSONAGEM - Mario que vai pular -->
        <img src="./img/mario.gif" class="mario" alt="Mario">

        <!-- OBSTACULO - Cano que o Mario precisa pular -->
        <img src="./img/pipe.png" class="cano" alt="Cano">

        <!-- FUNDO - Nuvem que se move devagar -->
        <img src="./img/nuvem.png" class="nuvem" alt="Nuvem">

        <!--
            PARA ADICIONAR MOEDA:
            <img src="moeda.png" class="moeda" alt="Moeda">
        -->

    </div>

    <!-- ================================================== -->
    <!-- TELA DE GAME OVER - Aparece quando o Mario bate -->
    <!-- ================================================== -->
    <div class="fim">
        <div class="gameover">
            <img src="./img/tela-game-over.png" alt="game over"  id="tela-game-over" >
        </div>

        <button class="reiniciar" >JOGAR NOVAMENTE</button><br>
        <a href="./index.html" style="text-decoration: none; color: white;">VOLTAR  A  TELA INICIAL</a>

    </div>

    <!-- ================================================== -->
    <!-- INSTRUÇÕES NA TELA (opcional) -->
    <!-- ================================================== -->
    <div style="text-align: center; margin-top: 20px; font-family: Arial;">
        <p>▶ Pressione QUALQUER TELA ou CLIQUE para pular</p>
    </div>

</body>
</html>
